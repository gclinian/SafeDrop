name: SafeDrop
options:
  bundleIdPrefix: com.safedrop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: NO     # Simulator builds don't need signing
    CODE_SIGN_IDENTITY: ""

targets:
  SafeDrop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SafeDrop
    info:
      path: SafeDrop/Info.plist
      properties:
        CFBundleDisplayName: SafeDrop
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # iOS 14+ requires a usage description for any LAN traffic.
        NSLocalNetworkUsageDescription: >
          SafeDrop needs local network access to discover and exchange
          encrypted data with your other devices on the same Wi-Fi. No
          data leaves your LAN.
        NSBonjourServices:
          - _safedrop._tcp
          - _safedrop._udp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.safedrop.ios
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
