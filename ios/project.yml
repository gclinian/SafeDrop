name: SafeDrop
options:
  bundleIdPrefix: com.safedrop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: NO     # Simulator builds don't need signing
    CODE_SIGN_IDENTITY: ""

targets:
  SafeDrop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SafeDrop
    info:
      path: SafeDrop/Info.plist
      properties:
        CFBundleDisplayName: SafeDrop
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # iOS 14+ requires a usage description for any LAN traffic.
        NSLocalNetworkUsageDescription: >
          SafeDrop needs local network access to discover and exchange
          encrypted data with your other devices on the same Wi-Fi. No
          data leaves your LAN.
        NSBonjourServices:
          - _safedrop._tcp
          - _safedrop._udp
        # v1.5: take_photo opens the camera; the user is already gated
        # behind the SafeDrop Allow/Deny dialog, so we only need a
        # usage string for iOS itself.
        NSCameraUsageDescription: >
          SafeDrop opens the camera when another paired device (e.g.
          your laptop's AI agent) calls the take_photo tool. You will
          see an Allow / Deny dialog before the camera is offered, and
          you choose whether to actually take a picture.
        NSPhotoLibraryUsageDescription: >
          SafeDrop only accesses your photo library if you choose to
          send a file that lives there.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.safedrop.ios
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
